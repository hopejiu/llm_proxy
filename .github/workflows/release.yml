name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: linux
            goarch: amd64
            suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=llm-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          go build -ldflags="-s -w" -o ${BINARY_NAME} ./cmd/server

      - name: Package
        run: |
          BINARY_NAME=llm-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          ARCHIVE_NAME=llm-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          mkdir -p package/web
          cp ${BINARY_NAME} package/
          cp -r web/* package/web/
          if [ -f .env ]; then cp .env package/; fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd package && zip -r ../${ARCHIVE_NAME}.zip . && cd ..
          else
            tar -czf ${ARCHIVE_NAME}.tar.gz -C package .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            llm-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.zip
            llm-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
          generate_release_notes: true
