name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $buildTime = Get-Date -Format "yyyy-MM-dd_HH:mm:ss"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "build_time=$buildTime" >> $env:GITHUB_OUTPUT

      - name: Build Wails App
        run: |
          $ldflags = "-s -w -X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=${{ steps.version.outputs.build_time }}"
          wails build -ldflags $ldflags

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $archiveName = "llm-proxy-windows-amd64"
          $staging = "staging"
          
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item "build/bin/llm-proxy.exe" $staging/
          if (Test-Path ".env") { Copy-Item ".env" $staging/ }
          
          Compress-Archive -Path "$staging/*" -DestinationPath "$archiveName.zip"
          
          Write-Host "Package contents:"
          Get-ChildItem $staging -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName.Substring((Resolve-Path $staging).Path.Length + 1))"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-proxy-windows-amd64
          path: llm-proxy-windows-amd64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-windows-amd64
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
